version: '3'

vars:
  BIN: bin
  TARGET: '{{.TARGET | default "pi-pelican.local"}}'
  PORT: '{{.PORT | default "/dev/ttyUSB0"}}'

tasks:
  # ── codegen ────────────────────────────────────────────────────────────────

  gen:oui:
    desc: "Generate OUI header (ESP32) and Go signatures from signatures.toml"
    sources:
      - signatures.toml
    generates:
      - esp32/src/oui_list.h
      - internal/detect/signatures_gen.go
    cmds:
      - go run ./cmd/gen-oui signatures.toml esp32/src/oui_list.h internal/detect/signatures_gen.go

  gen:pins:
    desc: "Validate pinspec and regenerate esp32/src/pins.h"
    sources:
      - pinspec.toml
    generates:
      - esp32/src/pins.h
    cmds:
      - go run ./cmd/gen-pins gen pinspec.toml esp32/src/pins.h

  gen:
    desc: "Run all code generators"
    deps: [gen:oui, gen:pins]

  # ── build ──────────────────────────────────────────────────────────────────

  build:
    desc: "Build all Go binaries (host platform)"
    deps: [gen]
    cmds:
      - mkdir -p {{.BIN}}
      - go build -o {{.BIN}}/flockdard ./cmd/flockdard
      - go build -o {{.BIN}}/flockdar  ./cmd/flockdar

  build:arm64:
    desc: "Cross-compile for Raspberry Pi (linux/arm64)"
    deps: [gen]
    env:
      GOOS: linux
      GOARCH: arm64
      CGO_ENABLED: "1"
      CC: aarch64-linux-gnu-gcc
    cmds:
      - mkdir -p {{.BIN}}
      - go build -o {{.BIN}}/flockdard-arm64 ./cmd/flockdard
      - go build -o {{.BIN}}/flockdar-arm64  ./cmd/flockdar

  build:all:
    desc: "Build for all targets"
    deps: [build, build:arm64]

  # ── test ───────────────────────────────────────────────────────────────────

  test:
    desc: "Run Go tests"
    cmds:
      - go test ./...

  test:race:
    desc: "Run Go tests with race detector"
    cmds:
      - go test -race ./...

  test:cover:
    desc: "Run tests with coverage report"
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report: coverage.html"

  # ── lint ───────────────────────────────────────────────────────────────────

  lint:
    desc: "Run go vet and staticcheck"
    cmds:
      - go vet ./...
      - staticcheck ./...

  fmt:
    desc: "Format all Go code"
    cmds:
      - gofmt -w .

  # ── firmware ───────────────────────────────────────────────────────────────

  firmware:build:
    desc: "Build T-Deck firmware"
    deps: [gen]
    dir: esp32
    cmds:
      - pio run -e t-deck

  firmware:flash:
    desc: "Build and flash T-Deck firmware"
    deps: [gen]
    dir: esp32
    cmds:
      - pio run -e t-deck -t upload

  firmware:build:s3:
    desc: "Build generic ESP32-S3 firmware"
    deps: [gen]
    dir: esp32
    cmds:
      - pio run -e esp32-s3

  firmware:flash:s3:
    desc: "Build and flash generic ESP32-S3 firmware"
    deps: [gen]
    dir: esp32
    cmds:
      - pio run -e esp32-s3 -t upload

  firmware:monitor:
    desc: "Open serial monitor for connected ESP32"
    dir: esp32
    cmds:
      - pio device monitor --baud 115200

  # ── dev ────────────────────────────────────────────────────────────────────

  dev:
    desc: "Run daemon in dev mode (--dev flag, serial on PORT)"
    deps: [gen]
    cmds:
      - go run ./cmd/flockdard --dev --module serial:{{.PORT}}

  dev:coconut:
    desc: "Run daemon with WiFi Coconut + BLE modules"
    deps: [gen]
    cmds:
      - go run ./cmd/flockdard --dev --module coconut --module ble --module meshtastic:/dev/ttyUSB0

  # ── deploy ─────────────────────────────────────────────────────────────────

  install:
    desc: "Cross-compile and deploy to Pi (TARGET=hostname)"
    deps: [build:arm64]
    cmds:
      - scp {{.BIN}}/flockdard-arm64 {{.TARGET}}:/usr/local/bin/flockdard
      - ssh {{.TARGET}} systemctl restart flockdard
      - echo "Deployed to {{.TARGET}}"

  install:service:
    desc: "Install systemd service on Pi (TARGET=hostname)"
    cmds:
      - scp deploy/flockdard.service {{.TARGET}}:/etc/systemd/system/flockdard.service
      - ssh {{.TARGET}} "systemctl daemon-reload && systemctl enable flockdard"

  logs:
    desc: "Tail daemon logs on Pi (TARGET=hostname)"
    cmds:
      - ssh {{.TARGET}} journalctl -fu flockdard

  # ── auth ───────────────────────────────────────────────────────────────────

  auth:qr:
    desc: "Print web UI access QR code to terminal (TARGET=hostname)"
    cmds:
      - ssh {{.TARGET}} "/usr/local/bin/flockdard auth-qr --config /etc/flockdard/config.toml"

  # ── db ─────────────────────────────────────────────────────────────────────

  db:backup:
    desc: "Backup SQLite database from Pi to ./backups/ (TARGET=hostname)"
    cmds:
      - mkdir -p backups
      - ssh {{.TARGET}} "sqlite3 /var/lib/flockdard/detections.db '.backup /tmp/flockdard-backup.db'"
      - scp {{.TARGET}}:/tmp/flockdard-backup.db "backups/detections-$(date +%Y%m%d-%H%M%S).db"
      - ssh {{.TARGET}} rm /tmp/flockdard-backup.db

  db:shell:
    desc: "Open SQLite shell on Pi (TARGET=hostname)"
    cmds:
      - ssh {{.TARGET}} "sqlite3 /var/lib/flockdard/detections.db"

  # ── sigs ───────────────────────────────────────────────────────────────────

  sigs:pull:
    desc: "Pull latest signatures from feed URL and regenerate headers"
    cmds:
      - go run ./cmd/sigs-pull
      - task: gen:oui

  sigs:check:
    desc: "Verify generated files match signatures.toml (CI check)"
    cmds:
      - task: gen
      - git diff --exit-code esp32/src/oui_list.h internal/detect/signatures_gen.go

  sigs:diff:
    desc: "Show what would change after regenerating from signatures.toml"
    cmds:
      - task: gen
      - git diff esp32/src/oui_list.h internal/detect/signatures_gen.go

  # ── cert ───────────────────────────────────────────────────────────────────

  cert:renew:
    desc: "Renew self-signed TLS certificate on Pi (TARGET=hostname)"
    cmds:
      - ssh {{.TARGET}} "/usr/local/bin/flockdard renew-cert"
      - ssh {{.TARGET}} "systemctl restart flockdard"

  # ── config ─────────────────────────────────────────────────────────────────

  config:validate:
    desc: "Validate config file without starting daemon"
    cmds:
      - go run ./cmd/flockdard --config "{{.CONFIG | default \"/etc/flockdard/config.toml\"}}" --validate-only

  config:show:
    desc: "Print resolved config with secrets redacted (TARGET=hostname)"
    cmds:
      - ssh {{.TARGET}} "/usr/local/bin/flockdard --config /etc/flockdard/config.toml --show-config"

  # ── tiles ──────────────────────────────────────────────────────────────────

  tiles:download:
    desc: "Download PMTiles extract for a region (REGION=us|new-york|etc)"
    cmds:
      - go run ./cmd/tiles-download --region {{.REGION}} --output "{{.TILES_PATH | default \"/var/lib/flockdard/tiles.pmtiles\"}}"

  tiles:info:
    desc: "Show info about the current PMTiles file"
    cmds:
      - go run ./cmd/tiles-download --info "{{.TILES_PATH | default \"/var/lib/flockdard/tiles.pmtiles\"}}"

  # ── firmware remote ────────────────────────────────────────────────────────

  firmware:flash:remote:
    desc: "Build and flash firmware via Pi serial passthrough (TARGET, PORT)"
    cmds:
      - task: firmware:build
      - scp esp32/.pio/build/t-deck/firmware.bin {{.TARGET}}:/tmp/fw.bin
      - ssh {{.TARGET}} "esptool.py --port {{.PORT | default \"/dev/ttyUSB1\"}} write_flash 0x0 /tmp/fw.bin"
      - ssh {{.TARGET}} rm /tmp/fw.bin

  # ── ci ─────────────────────────────────────────────────────────────────────

  ci:
    desc: "Full CI pipeline: gen → build → web → test → lint → firmware"
    cmds:
      - task: sigs:check
      - task: web:build
      - task: build
      - task: test:race
      - task: lint
      - task: firmware:build

  # ── oui db ─────────────────────────────────────────────────────────────────

  oui:update:
    desc: "Fetch latest IEEE OUI databases and rebuild SQLite oui_db table"
    cmds:
      - go run ./cmd/oui-update

  oui:stats:
    desc: "Show OUI database entry counts"
    cmds:
      - go run ./cmd/oui-update --stats

  # ── coconut ────────────────────────────────────────────────────────────────

  coconut:install:
    desc: "Build and install hak5-wifi-coconut userspace driver"
    cmds:
      - git clone https://github.com/hak5/hak5-wifi-coconut /tmp/coconut
      - cmake -S /tmp/coconut -B /tmp/coconut/build
      - cmake --build /tmp/coconut/build
      - sudo cmake --install /tmp/coconut/build
      - rm -rf /tmp/coconut

  coconut:test:
    desc: "Verify Coconut is detected and producing packets"
    cmds:
      - wifi_coconut --list-devices
      - timeout 5 wifi_coconut - | tcpdump -r - -c 5 2>/dev/null || true

  # ── bluetooth tether ───────────────────────────────────────────────────────

  bt:pair:
    desc: "Pair Android phone for BT tethering (MAC=aa:bb:cc:dd:ee:ff)"
    cmds:
      - bluetoothctl pair {{.MAC}}
      - bluetoothctl trust {{.MAC}}
    requires:
      vars: [MAC]

  bt:connect:
    desc: "Connect BT PAN tether (MAC=aa:bb:cc:dd:ee:ff)"
    cmds:
      - bt-network -c {{.MAC}} nap
      - sudo dhclient bnep0
    requires:
      vars: [MAC]

  # ── web ────────────────────────────────────────────────────────────────────

  web:install:
    desc: "Install web UI npm dependencies"
    dir: web
    cmds:
      - npm install

  web:dev:
    desc: "Start Vite dev server (proxied to running daemon on :8080)"
    dir: web
    cmds:
      - npm run dev

  web:build:
    desc: "Build web UI into web/dist/ for embedding in Go binary"
    dir: web
    cmds:
      - npm run build

  # ── util ───────────────────────────────────────────────────────────────────

  clean:
    desc: "Remove build artifacts"
    cmds:
      - rm -rf {{.BIN}} coverage.out coverage.html
      - rm -rf esp32/.pio

  tools:
    desc: "Install required Go tools"
    cmds:
      - go install honnef.co/go/tools/cmd/staticcheck@latest
      - go install github.com/go-task/task/v3/cmd/task@latest
      - echo "Also install: PlatformIO (pip install platformio)"
