; flockdar-esp32 — PlatformIO project
; Build:   pio run -e esp32-s3
; Flash:   pio run -e esp32-s3 -t upload
; Monitor: pio device monitor -b 115200
;
; The OUI / BLE name / mfgrid tables in src/oui_list.h are generated from the
; canonical signatures.py. Regenerate before building if signatures changed:
;   uv run esp32/gen_oui_header.py

[platformio]
default_envs = esp32-s3

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.3
build_flags =
    ; oui_list.h is generated into the project root by gen_oui_header.py
    -I $PROJECT_DIR
    ; HMAC key shared with the Python receiver. CHANGE THIS before field use.
    -DFD_HMAC_KEY=\"flockdar-dev-key\"
    ; Lock to one 2.4 GHz channel instead of hopping 1/6/11:
    ; -DFD_FIXED_CHANNEL=6

; --- ESP32-S3 (preferred: more RAM, better BLE throughput) -----------------
[env:esp32-s3]
board = esp32-s3-devkitc-1

; --- Original ESP32 --------------------------------------------------------
[env:esp32]
board = esp32dev

; --- ESP32-S3 with OLED + GPS peripherals ----------------------------------
; Wire an SSD1306 OLED (I²C) and a NMEA GPS (UART) per the pin defines in
; src/config.h, then build/flash this env.
[env:esp32-s3-full]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DFD_ENABLE_OLED
    -DFD_ENABLE_GPS
lib_deps =
    ${env.lib_deps}
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
    mikalhart/TinyGPSPlus @ ^1.0.3
