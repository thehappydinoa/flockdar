; flockdar-esp32 — PlatformIO project
; Board-specific build/flash guides: esp32/BOARDS.md
;   T-Deck:  pio run -e t-deck -t upload
;   S3 kit:  pio run -e esp32-s3 -t upload
; Monitor: pio device monitor -b 115200
;
; Generated headers (regenerate before building if their sources changed):
;   uv run esp32/gen_oui_header.py     -> oui_list.h, vendor_list.h (signatures.py)
;   uv run esp32/pin_spec.py gen       -> src/pins.h  (validated GPIO map)

[platformio]
default_envs = t-deck
boards_dir = boards

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.3
build_flags =
    ; oui_list.h is generated into the project root by gen_oui_header.py
    -I $PROJECT_DIR
    ; HMAC key shared with the Python receiver. CHANGE THIS before field use.
    -DFD_HMAC_KEY=\"flockdar-dev-key\"
    ; Lock to one 2.4 GHz channel instead of hopping 1/6/11:
    ; -DFD_FIXED_CHANNEL=6

; --- ESP32-S3 (preferred: more RAM, better BLE throughput) -----------------
[env:esp32-s3]
board = esp32-s3-devkitc-1

; --- Original ESP32 --------------------------------------------------------
[env:esp32]
board = esp32dev
build_flags =
    ${env.build_flags}
    -DCONFIG_IDF_TARGET_ESP32

; --- ESP32-S3 with microSD logging -----------------------------------------
; Untethered wardriving: writes /flock-NNNN.ndjson to the card (same JSON as
; the serial stream). The SD library ships with the framework — no lib_deps.
; Set the CS pin (and optional SPI pins) in src/config.h.
[env:esp32-s3-sd]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DFD_ENABLE_SD

; --- ESP32-S3 with OLED + GPS + microSD peripherals -------------------------
; Wire an SSD1306 OLED (I²C), a NMEA GPS (UART), and a microSD module (SPI)
; per the pin defines in src/config.h, then build/flash this env.
[env:esp32-s3-full]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DFD_ENABLE_OLED
    -DFD_ENABLE_GPS
    -DFD_ENABLE_SD
lib_deps =
    ${env.lib_deps}
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
    mikalhart/TinyGPSPlus @ ^1.0.3

; --- LilyGO T-Deck / T-Deck Plus (wardrive UI + GPS + SD) -------------------
; Matches LilyGO T-Deck platformio.ini: board T-Deck, espressif32@6.3.0,
; vendored lib/TFT_eSPI (ST7789 init patch — upstream bodmer ignores INIT_SEQUENCE_2).
; https://github.com/Xinyuan-LilyGO/T-Deck
[env:t-deck]
platform = espressif32@6.3.0
board = T-Deck
lib_extra_dirs = vendor
upload_speed = 460800
board_upload.wait_for_upload_port = true
board_upload.use_1200bps_touch = true
build_flags =
    ${env.build_flags}
    -DFD_BOARD_TDECK
    -DFD_ENABLE_TDECK_UI
    -DFD_ENABLE_GPS
    -DFD_ENABLE_SD
    -DFD_ENABLE_LORA
    -DBOARD_HAS_PSRAM=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSER_SETUP_LOADED=1
    -include $PROJECT_DIR/include/tdeck_tft_setup.h
lib_deps =
    ${env.lib_deps}
    mikalhart/TinyGPSPlus @ ^1.0.3
    jgromes/RadioLib @ ^6.6.0
